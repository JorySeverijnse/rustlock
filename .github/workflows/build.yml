          echo "Binary size (${{ matrix.features }}): $size bytes"
          if [ "${{ matrix.features }}" = "no-default-features" ] && [ $size -gt 3000000 ]; then
            echo "❌ Binary size exceeds 3MB threshold for no-networking build"
