    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          pacman -Sy --noconfirm \
            base-devel \
            llvm clang pkgconf \
            glib2 cairo pango atk gdk-pixbuf2 \
            pam dbus \
