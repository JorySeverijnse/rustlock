    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          dnf install -y \
            curl \
            llvm clang clang-devel \
            pkgconfig \
            glib2-devel cairo-devel cairo-gobject-devel pango-devel atk-devel \
            gdk-pixbuf2-devel pam-devel dbus-devel \
