      - name: Build (${{ matrix.features }})
        run: cargo build --verbose ${{ matrix.args }}
      - name: Run tests
        run: cargo test --verbose ${{ matrix.args }}
      - name: Build release for size check
        run: cargo build --release ${{ matrix.args }}
      - name: Check binary size
